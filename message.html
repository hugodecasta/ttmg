<!DOCTYPE html>
<html lang="fr">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reponse recue</title>
</head>

<body style="margin:0; padding:0; background-color:#f3f5f7;">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
        style="background-color:#f3f5f7; width:100%; margin:0; padding:24px 12px;">
        <tr>
            <td align="center">
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600"
                    style="width:600px; max-width:600px; background-color:#ffffff; border:1px solid #d8dde3; border-radius:12px;">
                    <tr>
                        <td
                            style="padding:28px 24px 12px 24px; font-family:Arial, Helvetica, sans-serif; color:#1f2a32;">
                            <p style="margin:10px 0 0 0; font-size:16px; line-height:24px; color:#5f6d78;">Message de
                                ton ami :</p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:0 24px 28px 24px;">
                            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
                                style="width:100%;">
                                <tr>
                                    <td
                                        style="font-family:Arial, Helvetica, sans-serif; font-size:16px; line-height:24px; color:#1f4f8c; font-weight:700; background-color:#edf5ff; border:1px solid #a8c2e5; border-radius:8px; padding:12px 14px; word-break:break-word;">
                                        {{message}}
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>
